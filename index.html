<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle AI - Premium Access</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS-ul anterior rămâne la fel, adăugăm doar stilul pentru Auth */
        :root{ --ink:#0a0a0a; --paper:#f5f3ee; --accent:#c8562a; --line:rgba(0,0,0,0.1); --mono:'JetBrains Mono'; --display:'Syne'; }
        body { background: var(--paper); color: var(--ink); font-family: var(--mono); margin:0; }
        .w { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        
        /* AUTH UI */
        #auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 8px; border: 1px solid var(--line); width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .auth-title { font-family: var(--display); font-size: 24px; margin-bottom: 1.5rem; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--line); border-radius: 4px; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: var(--ink); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .auth-btn:hover { background: var(--accent); }
        .switch-auth { font-size: 12px; text-align: center; margin-top: 15px; cursor: pointer; color: #666; }
        
        /* APP UI (Ascunse inițial) */
        #app-content { display: none; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 12px; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
        
        /* Restul stilurilor din versiunea anterioară pentru rezultate și terminal... */
        .run-btn { width: 100%; background: var(--ink); color: white; padding: 15px; border: none; border-radius: 4px; font-family: var(--display); cursor: pointer; font-weight: 800; }
        .terminal { background: #0d1117; color: #58a6ff; padding: 15px; border-radius: 5px; margin-top: 15px; font-size: 12px; display: none; }
        .result { margin-top: 20px; display: none; }
        .r-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .r-cell { background: white; padding: 15px; border: 1px solid var(--line); }
        .full { grid-column: 1 / -1; }
        .r-lbl { font-size: 10px; color: var(--accent); font-weight: bold; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; }
        .modal { background:white; padding:30px; border-radius:8px; text-align:center; max-width:400px; }
    </style>
</head>
<body>

<div class="w">
    <div id="auth-container">
        <div class="auth-card">
            <div class="auth-title" id="auth-title">Intră în Oracle AI</div>
            <input type="email" id="auth-email" placeholder="Email-ul tău">
            <input type="password" id="auth-password" placeholder="Parolă">
            <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">Autentificare</button>
            <div class="switch-auth" onclick="toggleAuthMode()" id="auth-switch">Nu ai cont? Înregistrează-te</div>
        </div>
    </div>

    <div id="app-content">
        <div class="user-bar">
            <div>Logat ca: <b id="user-email">...</b> | Credite: <b id="user-credits">0</b></div>
            <button onclick="signOut()" style="background:none; border:none; cursor:pointer; color:var(--accent); text-decoration:underline; font-size:11px;">Ieșire</button>
        </div>

        <div class="header">
            <h1 style="font-family:var(--display)">ORACLE.AI</h1>
        </div>

        <div style="margin-bottom:20px;">
            <select id="sector-select" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="">Alege Industrie...</option>
                <option value="Logistică">Logistică</option>
                <option value="FinTech">FinTech</option>
                <option value="Cybersec">Cybersec</option>
            </select>
            <textarea id="prob" style="width:100%; height:80px; padding:10px;" placeholder="Descrie problema..."></textarea>
        </div>

        <button class="run-btn" id="runBtn" onclick="run()">▶ ACTIVEAZĂ ANALIZA</button>
        
        <div class="terminal" id="terminal"></div>
        <div id="result" class="result"></div>
    </div>
</div>

<div class="modal-overlay" id="paywallModal">
    <div class="modal">
        <h2>🔮 Limita Atinsă</h2>
        <p>Ai consumat analizele gratuite. Treci la Premium pentru acces nelimitat.</p>
        <a href="https://buy.stripe.com/bJeeVcdhsaMsgL44Wnc3m0a" style="display:block; background:#635bff; color:white; padding:15px; text-decoration:none; border-radius:5px; font-weight:bold; margin-top:20px;">Deblochează Premium - 19€</a>
    </div>
</div>

<script>
    // CONFIGURARE SUPABASE - INLOCUIESTE CU DATELE TALE!
    const SB_URL = "https://oiotboqjukamwijfmheo.supabase.co"; 
    const SB_KEY = "sb_publishable_fFEdw-2lQ_VbuIIbCAG2Hw_brZSIe-v";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let isLoginMode = true;
    let currentUser = null;

    // 1. Verificăm dacă userul este deja logat la deschiderea paginii
    window.onload = async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            setupUI(session.user);
        }
    };

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').textContent = isLoginMode ? "Intră în Oracle AI" : "Creează Cont Nou";
        document.getElementById('auth-submit-btn').textContent = isLoginMode ? "Autentificare" : "Înregistrare";
        document.getElementById('auth-switch').textContent = isLoginMode ? "Nu ai cont? Înregistrează-te" : "Ai deja cont? Loghează-te";
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;

        if (isLoginMode) {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else setupUI(data.user);
        } else {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) alert("Verifică email-ul pentru confirmare!");
            else alert("Cont creat! Verifică email-ul (Inbox/Spam) pentru confirmare.");
        }
    }

    async function setupUI(user) {
        currentUser = user;
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('user-email').textContent = user.email;
        refreshCredits();
    }

    async function refreshCredits() {
        const { data, error } = await supabase.from('profiles').select('credits').eq('email', currentUser.email).single();
        if (data) document.getElementById('user-credits').textContent = data.credits;
    }

    async function signOut() {
        await supabase.auth.signOut();
        location.reload();
    }

    async function run() {
        const sector = document.getElementById('sector-select').value;
        const prob = document.getElementById('prob').value;
        
        if(!sector || !prob) return alert("Completează datele!");

        const btn = document.getElementById('runBtn');
        btn.disabled = true;
        document.getElementById('terminal').style.display = 'block';
        document.getElementById('terminal').textContent = "> Analiză în curs...";

        try {
            const res = await fetch('/api/oracle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sector, prob, email: currentUser.email, systemPrompt: "Ești un expert McKinsey..." })
            });

            if (res.status === 403) {
                document.getElementById('paywallModal').style.display = 'flex';
                btn.disabled = false;
                return;
            }

            const data = await res.json();
            render(data);
            refreshCredits();
        } catch (e) {
            alert("Eroare la server!");
        }
        btn.disabled = false;
    }

    function render(r) {
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').innerHTML = `
            <div class="r-grid">
                <div class="r-cell full"><div class="r-lbl">GAP PIATA</div><div>${r.gap}</div></div>
                <div class="r-cell"> <div class="r-lbl">VALOARE IP</div><div style="font-size:20px; font-weight:800;">$${r.valoare_min}-${r.valoare_max}M</div></div>
                <div class="r-cell"> <div class="r-lbl">DIFICULTATE</div><div>${r.dificultate}</div></div>
            </div>
        `;
    }
</script>
</body>
</html>
