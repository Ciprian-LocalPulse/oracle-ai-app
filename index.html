<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle AI - Innovation Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --ink:#0a0a0a;--paper:#f5f3ee;--accent:#c8562a;--accent2:#1a3a5c;
            --line:rgba(0,0,0,0.1);--mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
        }
        body { background: var(--paper); color: var(--ink); font-family: var(--mono); }
        .w{max-width: 1000px; margin: 0 auto; min-height:100vh; padding:2rem; position:relative}
        .w::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
        
        /* AUTH UI */
        #auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 12px; border: 1px solid var(--line); width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; }
        .auth-logo { font-family: var(--display); font-size: 32px; font-weight: 800; margin-bottom: 2rem; }
        .auth-logo span { color: var(--accent); }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--line); border-radius: 6px; font-family: var(--mono); outline: none; transition: 0.2s; }
        .auth-input:focus { border-color: var(--accent); }
        .auth-btn { width: 100%; padding: 15px; background: var(--ink); color: white; border: none; border-radius: 6px; font-family: var(--display); font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .auth-btn:hover { background: var(--accent); transform: translateY(-2px); }
        .switch-btn { margin-top: 20px; font-size: 12px; color: #666; cursor: pointer; text-decoration: underline; }

        /* APP CONTENT (Ascuns initial) */
        #app-content { display: none; }

        .header{display:flex;align-items:baseline;gap:16px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--line)}
        .logo{font-family:var(--display);font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-1px}
        .logo span{color:var(--accent)}
        .user-info { margin-left: auto; font-size: 11px; text-align: right; }
        .logout-link { color: var(--accent); cursor: pointer; text-decoration: underline; margin-top: 4px; display: block; }

        .sectors{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1.5rem}
        .s-btn{background:white;border:1px solid var(--line);border-radius:6px;padding:15px 10px;cursor:pointer;text-align:center;transition:all .15s}
        .s-btn:hover{border-color:var(--accent);transform:translateY(-2px)}
        .s-btn.sel{background:var(--ink);color:white;border-color:var(--ink)}
        .s-ico{font-size:20px;display:block;margin-bottom:6px}
        .s-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px}

        .input-area{margin-bottom:1.5rem}
        .input-label{font-size:11px;color:#888;margin-bottom:8px;display:flex;align-items:center;gap:6px}
        textarea{width:100%;background:white;border:1px solid var(--line);border-radius:6px;padding:15px;font-family:var(--mono);font-size:13px;height:100px;outline:none;resize:none}

        .run-btn{width:100%;background:var(--ink);color:white;padding:18px;border:none;border-radius:6px;font-family:var(--display);font-size:15px;font-weight:800;cursor:pointer;transition:0.2s}
        .run-btn:hover{background:var(--accent);letter-spacing:1px}
        .run-btn:disabled{opacity:0.5;cursor:not-allowed}

        .terminal{background:#0d1117;color:#58a6ff;padding:1.5rem;border-radius:8px;margin-top:1.5rem;font-size:12px;display:none;max-height:200px;overflow-y:auto;line-height:1.6}
        
        .result{margin-top:2rem;display:none}
        .r-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden}
        .r-cell{background:white;padding:1.5rem}
        .r-cell.full{grid-column:1/-1}
        .r-lbl{font-size:10px;color:var(--accent);font-weight:700;margin-bottom:8px;text-transform:uppercase}
        .r-val{font-size:13px;line-height:1.7}
        .r-big{font-family:var(--display);font-size:28px;font-weight:800}

        /* MODAL PAYWALL */
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:999;justify-content:center;align-items:center;backdrop-filter:blur(5px)}
        .modal{background:var(--paper);padding:3rem;border-radius:12px;max-width:450px;text-align:center;border:2px solid var(--accent)}
        .stripe-btn{display:block;background:#635bff;color:white;padding:16px;border-radius:6px;text-decoration:none;font-weight:700;margin-top:2rem}
    </style>
</head>
<body>

<div class="w">
    <div id="auth-container">
        <div class="auth-card">
            <div class="auth-logo">ORACLE<span>.</span>AI</div>
            <h2 id="auth-title" style="margin-bottom:20px; font-size:18px;">Intră în sistem</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Adresa de email">
            <input type="password" id="auth-password" class="auth-input" placeholder="Parola secretă">
            <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">AUTENTIFICARE</button>
            <div class="switch-btn" id="auth-switch" onclick="toggleAuthMode()">Nu ai cont? Înregistrează-te aici</div>
        </div>
    </div>

    <div id="app-content">
        <div class="header">
            <div class="logo">ORACLE<span>.</span>AI</div>
            <div class="user-info">
                Logat: <b id="user-email">...</b><br>
                Credite: <b id="user-credits">0</b>
                <span class="logout-link" onclick="signOut()">Ieșire sistem</span>
            </div>
        </div>

        <div class="sectors">
            <button class="s-btn" data-v="Logistică și Supply Chain" onclick="sel(this)"><span class="s-ico">🚚</span><span class="s-lbl">Logistică</span></button>
            <button class="s-btn" data-v="FinTech și Plăți Digitale" onclick="sel(this)"><span class="s-ico">🏦</span><span class="s-lbl">FinTech</span></button>
            <button class="s-btn" data-v="Energie și Sustenabilitate" onclick="sel(this)"><span class="s-ico">⚡</span><span class="s-lbl">Energie</span></button>
            <button class="s-btn" data-v="Cybersecurity" onclick="sel(this)"><span class="s-ico">🔐</span><span class="s-lbl">Cybersec</span></button>
            <button class="s-btn" data-v="MedTech și Sănătate" onclick="sel(this)"><span class="s-ico">🏥</span><span class="s-lbl">MedTech</span></button>
        </div>

        <div class="input-area">
            <div class="input-label">> DESCRIEȚI PROVOCAREA TEHNICĂ</div>
            <textarea id="prob" placeholder="Ex: Optimizarea rutelor de livrare pentru reducerea amprentei de carbon cu 20%..."></textarea>
        </div>

        <button class="run-btn" id="runBtn" onclick="run()">▶ ACTIVEAZĂ ANALIZA ORACLE</button>

        <div class="terminal" id="terminal"></div>
        <div id="result" class="result"></div>
    </div>
</div>

<div class="modal-overlay" id="paywallModal">
    <div class="modal">
        <div style="font-size:50px">🔮</div>
        <h2 style="font-family:var(--display); margin:15px 0">Limită Atinsă</h2>
        <p style="font-size:14px; color:#555">Ai folosit cele 2 analize gratuite. Treci la Oracle AI Premium pentru acces nelimitat.</p>
        <a href="https://buy.stripe.com/bJeeVcdhsaMsgL44Wnc3m0a" class="stripe-btn">Deblochează Premium - 19€/lună</a>
    </div>
</div>

<script>
    // 1. DATELE TALE SUPABASE (Pune-le pe cele corecte!)
    const SB_URL = "https://oiotboqjukamwijfmheo.supabase.co"; 
    const SB_KEY = "sb_publishable_fFEdw-2lQ_VbuIIbCAG2Hw_brZSIe-v"; // Pune cheia ta lunga aici
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let isLoginMode = true;
    let currentUser = null;
    let sector = '';

    window.onload = async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) setupUI(session.user);
    };

    function sel(b){
        document.querySelectorAll('.s-btn').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel'); sector = b.dataset.v;
    }

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').textContent = isLoginMode ? "Intră în sistem" : "Creează cont nou";
        document.getElementById('auth-submit-btn').textContent = isLoginMode ? "AUTENTIFICARE" : "ÎNREGISTRARE";
        document.getElementById('auth-switch').textContent = isLoginMode ? "Nu ai cont? Înregistrează-te aici" : "Ai deja cont? Loghează-te";
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        if(!email || !password) return alert("Introdu datele!");
        try {
            if(isLoginMode){
                const {data, error} = await sb.auth.signInWithPassword({email, password});
                if(error) throw error; setupUI(data.user);
            } else {
                const {data, error} = await sb.auth.signUp({email, password});
                if(error) throw error; alert("Cont creat! Te logăm...");
                const {data:ld} = await sb.auth.signInWithPassword({email, password}); setupUI(ld.user);
            }
        } catch(e) { alert(e.message); }
    }

    function setupUI(user) {
        currentUser = user;
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('user-email').textContent = user.email;
        refreshCredits();
    }

    async function refreshCredits() {
        const { data } = await sb.from('profiles').select('credits').eq('email', currentUser.email).single();
        if(data) document.getElementById('user-credits').textContent = data.credits;
    }

    async function signOut() { await sb.auth.signOut(); location.reload(); }

   async function run() {
        const prob = document.getElementById('prob').value.trim();
        if(!sector || !prob) return alert("Selectează industria și scrie problema!");
        
        const btn = document.getElementById('runBtn');
        btn.disabled = true;
        const term = document.getElementById('terminal');
        term.style.display = 'block';
        term.innerHTML = `> Inițializare Oracle v2.0...<br>> Verificare credite pentru ${currentUser.email}...`;

        // INSTRUCTIUNI ULTRA-STRICTE PENTRU AI
        const promptStrict = `Ești un expert McKinsey. Analizează problema și răspunde EXCLUSIV sub formă de obiect JSON, respectând EXACT aceste chei:
        "gap": "descriere scurtă a oportunității",
        "valoare_min": 10,
        "valoare_max": 50,
        "dificultate": "Scăzută/Medie/Ridicată",
        "monetizare": "explicație scurtă a modelului de business".
        Nu adăuga niciun alt text în afara de JSON.`;

        try {
            const res = await fetch('/api/oracle', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    sector, 
                    prob, 
                    email: currentUser.email, 
                    systemPrompt: promptStrict // Trimitem noul prompt strict
                })
            });

            if(res.status === 403) {
                document.getElementById('paywallModal').style.display = 'flex';
                btn.disabled = false; return;
            }

            const data = await res.json();
            console.log("Date primite de la AI:", data); // Vedem in consola ce a raspuns

            term.innerHTML += `<br>> Analiză completă. Randare rezultate...`;
            render(data);
            refreshCredits();
        } catch(e) { 
            console.error(e);
            alert("Eroare server! Verificați consola (F12)."); 
        }
        btn.disabled = false;
    }

    function render(r) {
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').innerHTML = `
            <div class="r-grid">
                <div class="r-cell full"><div class="r-lbl">GAP IDENTIFICAT</div><div class="r-val">${r.gap || 'N/A'}</div></div>
                <div class="r-cell"><div class="r-lbl">VALOARE ESTIMATĂ</div><div class="r-big">$${r.valoare_min || 0}-${r.valoare_max || 0}M</div></div>
                <div class="r-cell"><div class="r-lbl">DIFICULTATE</div><div class="r-big" style="font-size:18px">${r.dificultate || 'Medie'}</div></div>
                <div class="r-cell full"><div class="r-lbl">ARHITECTURĂ ȘI MONETIZARE</div><div class="r-val">${r.monetizare || 'N/A'}</div></div>
            </div>`;
    }
</script>
</body>
</html>
